<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#071224"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Concurso Bíblico"><link rel="manifest" href="manifest.webmanifest"><title>Concurso Bíblico</title><script defer src="phaseBankManifest.js?v=13.6"></script><style>
:root{--bg:#071224;--card:#0e1d35;--gold:#f7c948;--txt:#f8fafc;--mut:#a8b3c7;--line:rgba(255,255,255,.12);--ok:#22c55e;--bad:#ef4444}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#17365f 0,#071224 45%,#020617 100%);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:10px}.app{max-width:900px;margin:0 auto}.hero,.card,.qcard{background:rgba(14,29,53,.95);border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 45px rgba(0,0,0,.35);padding:16px}.hero{text-align:center;background:linear-gradient(135deg,rgba(247,201,72,.18),rgba(45,212,191,.10));margin-bottom:12px}.logo{width:58px;height:58px;margin:0 auto 8px;border-radius:18px;background:linear-gradient(145deg,#f7c948,#d97706);display:grid;place-items:center;color:#071224;font-size:32px;font-weight:950}h1{margin:0;font-size:34px}.sub{color:var(--mut);margin:4px 0 0}.grid{display:grid;gap:12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:560px){.row{grid-template-columns:1fr}h1{font-size:31px}.q{font-size:25px}.ans{font-size:16px}}label{font-size:13px;color:#dbeafe;display:block;margin:10px 0 5px}select,input{width:100%;border:1px solid rgba(255,255,255,.15);background:#08162b;color:#fff;border-radius:14px;padding:12px}.btns{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:12px}.btn{border:0;border-radius:16px;padding:13px 15px;font-weight:850;min-height:46px}.primary{background:var(--gold);color:#111827}.secondary{background:#1d3558;color:#fff;border:1px solid var(--line)}.ok{background:#16a34a;color:#ecfdf5}.wa{background:#22c55e;color:#052e16}.status{margin-top:10px;padding:11px;border-radius:16px;background:rgba(0,0,0,.23);color:#d1d5db}.pill{display:inline-flex;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--line);font-size:12px;color:#e5e7eb}.pillrow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}.hide{display:none!important}.game{display:none;min-height:calc(100dvh - 20px)}.gameShell{min-height:calc(100dvh - 24px);display:flex;flex-direction:column;gap:10px}.top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.topl{display:flex;gap:8px;flex-wrap:wrap}.mini{padding:8px 10px;min-height:36px;font-size:12px}.qcard{flex:1;display:flex;flex-direction:column;justify-content:center}.q{text-align:center;font-weight:950;font-size:clamp(24px,7vw,42px);line-height:1.18;margin:8px 0 18px}.answers{display:grid;gap:10px}.ans{text-align:left;border:1px solid rgba(255,255,255,.14);background:#10213c;color:#fff;border-radius:20px;padding:15px;min-height:58px;font-weight:800}.correct{background:#14532d!important;border-color:#22c55e!important}.wrong{background:#5b1111!important;border-color:#ef4444!important}.feedback{margin-top:10px;padding:12px;border-radius:18px;background:rgba(0,0,0,.25)}.timerWrap{height:12px;background:#111827;border:1px solid rgba(255,255,255,.16);border-radius:999px;overflow:hidden}.timerBar{height:100%;width:100%;background:linear-gradient(90deg,#22c55e,#facc15,#ef4444)}.danger{color:#f87171!important;animation:pulse .45s infinite alternate}@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
</style></head><body><main class="app"><section id="home"><div class="hero"><div class="logo">✝</div><h1>Concurso Bíblico</h1><p class="sub">Escolha a fase, responda no tempo e avance no desafio.</p><span class="pill">V13.6 · Fases</span></div><div class="card"><button class="btn primary" id="startBtn" style="width:100%;font-size:20px;min-height:60px">Começar jogo</button><div class="pillrow"><span class="pill" id="bankInfo">Banco: carregando...</span><span class="pill" id="quickInfo">Fase 1 · 10 perguntas · 12s</span></div><div class="row"><div><label>Fase</label><select id="phase"></select></div><div><label>Quantidade da rodada</label><input id="qty" type="number" min="1" value="10"></div></div><div class="row"><div><label>Tempo por pergunta</label><select id="timerSeconds"><option>3</option><option>6</option><option>9</option><option selected>12</option></select></div><div><label>Nível</label><select id="level"><option value="Todos">Todos</option><option value="facil">Fácil</option><option value="medio">Médio</option><option value="dificil">Difícil</option></select></div></div><div class="btns"><button class="btn secondary" id="quickQty">Rodada rápida: 10</button><button class="btn secondary" id="audioBtn">Som: ligado</button><button class="btn ok" id="shareBtn">Compartilhar</button><button class="btn wa" id="zapBtn">WhatsApp</button></div><div class="status" id="status">Pronto para jogar.</div></div></section><section id="game" class="game"><div class="gameShell"><div class="top"><div class="topl"><span class="pill" id="progress"></span><span class="pill" id="score"></span><span class="pill" id="timeTxt"></span><span class="pill" id="phaseTxt"></span></div><button class="btn secondary mini" id="quitBtn">Sair</button></div><div class="timerWrap"><div class="timerBar" id="timerBar"></div></div><div class="qcard"><div class="q" id="question"></div><div class="answers" id="answers"></div><div class="feedback hide" id="feedback"></div></div><button class="btn primary hide" id="nextBtn">Próxima</button></div></section><section id="result" class="game"><div class="gameShell" style="justify-content:center"><div class="card" style="text-align:center"><h2>Resultado final</h2><div style="font-size:25px;font-weight:950;color:var(--gold)" id="finalScore"></div><p class="sub" id="finalText"></p><div class="btns"><button class="btn primary" id="againBtn">Jogar novamente</button><button class="btn secondary" id="homeBtn">Voltar</button><button class="btn ok" id="shareResultBtn">Compartilhar</button></div></div></div></section></main><script>
(function(){'use strict';const APP_URL=location.origin+location.pathname.replace(/index\.html$/,'');let phases=[],phaseBank={},questions=[],round=[],current=0,hits=0,answered=false,timer=null,timeLeft=12,totalTime=12,audio=true,ctx=null,tension=null,step=0;const $=id=>document.getElementById(id);function t(v){return String(v??'').trim()}function esc(s){return t(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function letter(v){v=t(v).toUpperCase();return ['A','B','C','D'].includes(v[0])?v[0]:'A'}function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function setStatus(m){$('status').innerHTML=m}function loadScript(src){return new Promise((res,rej)=>{let s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s)})}async function init(){phases=window.CONCURSO_BIBLICO_PHASES||[];$('phase').innerHTML=phases.map(p=>`<option value="${p.id}">${p.titulo} · ${p.total} perguntas</option>`).join('');refreshInfo();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{})}async function loadPhase(id){if(phaseBank[id])return phaseBank[id];const p=phases.find(x=>x.id===id);if(!p)throw Error('Fase não encontrada');setStatus('Carregando '+p.titulo+'...');await loadScript(p.arquivo+'?v=13.6');phaseBank=window.CONCURSO_BIBLICO_BANKS||{};return phaseBank[id]||[]}function refreshInfo(){let p=phases.find(x=>x.id===$('phase').value)||phases[0];if(p){$('bankInfo').textContent=`${p.titulo}: ${p.total} perguntas · ${p.facil} fáceis · ${p.medio} médias · ${p.dificil} difíceis`; $('quickInfo').textContent=`${p.titulo} · ${$('qty').value||10} perguntas · ${$('timerSeconds').value}s`;}}function ac(){if(!audio)return null;let AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;if(!ctx)ctx=new AC();if(ctx.state==='suspended')ctx.resume();return ctx}function tone(f,d,type='sine',g=.04,delay=0){let c=ac();if(!c)return;let tt=c.currentTime+delay,o=c.createOscillator(),gn=c.createGain();o.type=type;o.frequency.setValueAtTime(f,tt);gn.gain.setValueAtTime(.0001,tt);gn.gain.exponentialRampToValueAtTime(g,tt+.02);gn.gain.exponentialRampToValueAtTime(.0001,tt+d);o.connect(gn).connect(c.destination);o.start(tt);o.stop(tt+d+.03)}function okS(){tone(660,.14,'sine',.07);tone(880,.18,'sine',.06,.1)}function badS(){tone(170,.22,'sawtooth',.05);tone(110,.25,'sawtooth',.04,.16)}function beat(){if(!audio||!ctx)return;[196,207,220,233,247,262,247,233].slice(step%8,step%8+1).forEach(f=>tone(f,.16,'triangle',.022));step++}function startBeat(){if(!audio)return;ac();if(tension)return;beat();tension=setInterval(beat,430)}function stopBeat(){clearInterval(tension);tension=null}async function startGame(){startBeat();let id=$('phase').value;questions=await loadPhase(id);let lvl=$('level').value;let pool=questions.filter(q=>lvl==='Todos'||t(q.nivel).toLowerCase()===lvl);if(!pool.length){setStatus('Nenhuma pergunta nessa seleção.');return}let qty=Math.max(1,Math.min(parseInt($('qty').value||10,10),pool.length));round=shuf(pool).slice(0,qty);current=0;hits=0;$('home').style.display='none';$('result').style.display='none';$('game').style.display='block';render();scrollTo(0,0)}function render(){answered=false;let q=round[current],p=phases.find(x=>x.id===$('phase').value);$('progress').textContent=(current+1)+'/'+round.length;$('score').textContent='Acertos: '+hits;$('phaseTxt').textContent=p?p.titulo:'';$('question').textContent=q.pergunta;$('feedback').classList.add('hide');$('nextBtn').classList.add('hide');$('answers').innerHTML='';['A','B','C','D'].forEach(k=>{let b=document.createElement('button');b.className='ans';b.textContent=k+') '+q[k];b.onclick=()=>answer(k,false);$('answers').appendChild(b)});startTimer()}function startTimer(){clearInterval(timer);totalTime=parseInt($('timerSeconds').value||12,10);timeLeft=totalTime;paintTimer();timer=setInterval(()=>{timeLeft--;paintTimer();if(timeLeft<=0){clearInterval(timer);answer('',true)}},1000)}function paintTimer(){let pct=Math.max(0,timeLeft/totalTime*100);$('timeTxt').textContent=Math.max(0,timeLeft)+'s';$('timerBar').style.width=pct+'%';$('timeTxt').classList.toggle('danger',timeLeft<=3)}function answer(ch,expired){if(answered)return;answered=true;clearInterval(timer);let q=round[current],ok=!expired&&ch===letter(q.correta);if(ok){hits++;okS()}else badS();document.querySelectorAll('.ans').forEach(b=>{let l=b.textContent[0];if(l===letter(q.correta))b.classList.add('correct');else if(l===ch)b.classList.add('wrong');b.disabled=true});$('score').textContent='Acertos: '+hits;$('feedback').classList.remove('hide');$('feedback').innerHTML=(ok?'✅ Correto!':expired?'⏱ Tempo esgotado! Resposta: '+letter(q.correta):'❌ Resposta correta: '+letter(q.correta))+(q.referencia?'<br><b>Referência:</b> '+esc(q.referencia):'')+(q.aprendizado?'<br><b>Aprendizado:</b> '+esc(q.aprendizado):'');$('nextBtn').classList.remove('hide')}function next(){current++;current>=round.length?finish():render()}function finish(){clearInterval(timer);stopBeat();$('game').style.display='none';$('result').style.display='block';let pct=Math.round(hits/round.length*100);$('finalScore').textContent=`${hits} de ${round.length} acertos · ${pct}%`;$('finalText').textContent=pct>=80?'Excelente resultado!':pct>=50?'Bom caminho. Continue estudando.':'Revise e tente novamente.';scrollTo(0,0)}function home(){clearInterval(timer);stopBeat();$('game').style.display='none';$('result').style.display='none';$('home').style.display='block';setStatus('Pronto para jogar.');scrollTo(0,0)}function cycleQty(){let opts=[5,10,15,20,30,50],i=opts.indexOf(parseInt($('qty').value||10,10));i=(i+1)%opts.length;$('qty').value=opts[i];$('quickQty').textContent='Rodada rápida: '+opts[i];refreshInfo()}async function share(){let text='Vamos jogar o Concurso Bíblico: '+APP_URL;if(navigator.share)try{await navigator.share({title:'Concurso Bíblico',text,url:APP_URL});return}catch(e){}try{await navigator.clipboard.writeText(APP_URL);setStatus('✅ Link copiado.')}catch(e){setStatus(APP_URL)}}function zap(){location.href='https://wa.me/?text='+encodeURIComponent('Vamos jogar o Concurso Bíblico: '+APP_URL)}$('startBtn').onclick=startGame;$('nextBtn').onclick=next;$('quitBtn').onclick=home;$('againBtn').onclick=startGame;$('homeBtn').onclick=home;$('quickQty').onclick=cycleQty;$('shareBtn').onclick=share;$('shareResultBtn').onclick=share;$('zapBtn').onclick=zap;$('audioBtn').onclick=()=>{audio=!audio;$('audioBtn').textContent=audio?'Som: ligado':'Som: desligado';if(!audio)stopBeat()};['phase','qty','timerSeconds','level'].forEach(id=>$(id).onchange=refreshInfo);window.addEventListener('load',init);})();
</script></body></html>
